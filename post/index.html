function postItemClick(pid,ev){if(ev&&ev.target&&ev.target.closest('button,a'))return;location.href='/post/?id='+pid}

/* ── dropdown ── */
function toggleDD(e){e.stopPropagation();var d=document.getElementById('account-dropdown');if(d)d.classList.toggle('open')}
document.addEventListener('click',function(){var d=document.getElementById('account-dropdown');if(d)d.classList.remove('open')});

/* ── util ── */
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ea(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function fmtD(iso){if(!iso)return'';var d=new Date(iso),n=new Date(),s=(n-d)/1000;if(s<60)return Math.floor(s)+'秒前';if(s<3600)return Math.floor(s/60)+'分前';if(s<86400)return Math.floor(s/3600)+'時間前';return(d.getMonth()+1)+'/'+(d.getDate())}
function fmtFull(iso){if(!iso)return'';var d=new Date(iso);return d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')}
function autoLink(txt){return txt.replace(/(https?:\/\/[^\s<&]+)/g,'<a class="auto-link" href="$1" target="_blank" rel="noopener">$1</a>')}
function splitContent(raw){var c=String(raw||'');var m=c.match(/\n?\n?\[img\](https?:\/\/[^\s]+)\[\/img\]\s*$/);if(!m)return{text:c,img:''};return{text:c.replace(/\n?\n?\[img\](https?:\/\/[^\s]+)\[\/img\]\s*$/,'').trim(),img:m[1]}}
function getAv(uid){if(!uid)return null;return supa.storage.from(BUCKET).getPublicUrl('profiles/'+uid+'/avatar').data.publicUrl+'?v='+Date.now()}
function getRootId(){return new URLSearchParams(location.search).get('id')}

/* ── init ── */
async function init(){
 var s=(await supa.auth.getSession()).data.session;
 mySession=s;myUid=s?s.user.id:null;
 if(myUid){
  var pr=await supa.from('profiles').select('*').eq('id',myUid).single();
  myProfile=pr.data||null;
 }
 renderHeader(s);
 var rid=getRootId();
 if(!rid){show404();return}
 var rr=await supa.from('posts').select('*').eq('id',rid).single();
 if(rr.error||!rr.data){show404();return}
 rootPost=rr.data;
 document.title=(rootPost.author||'Koro')+'のころっと - Koro';
 var repl=await supa.from('posts').select('*').eq('root_id',String(rid)).order('created_at',{ascending:true});
 allReplies=repl.data||[];
 var allIds=[rootPost.id].concat(allReplies.map(function(p){return p.id})).filter(Boolean);
 await prefetchUids([rootPost].concat(allReplies));
 await fetchLikes(allIds);
 renderThread();
}

 var hr=document.getElementById('header-right');
 var tb='<button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" title="Theme"></button>';
 if(session&&myProfile){
  hr.innerHTML=tb+
   '<div class="account-wrap">'+
   '<button class="account-btn" id="account-btn" onclick="toggleDD(event)" title="Account"></button>'+

   '<a class="dropdown-item" href="/user/?@'+esc(myProfile.user_handle||'')+'">'+avI()+'プロフィール</a>'+
   '<a class="dropdown-item" href="/user/?@'+esc(myProfile.user_handle||'')+'#edit">'+
   '<svg xmlns="http://www.w3.org/2000/svg" height="16" viewBox="0 -960 960 960" width="16" fill="currentColor"><path d="M200-200h40l439-439-40-40-439 439v40Zm-40 80v-104l565-565q11-12 26-18t31-6q16 0 31 6t26 17l42 42q11 11 17 26t6 31q0 16-6 31t-18 26L315-120H160Z"/></svg>'+
   'プロフィール編集</a>'+
   '<button class="dropdown-item danger" onclick="supa.auth.signOut().then(function(){location.href=\'/\'})">'+
   '<svg xmlns="http://www.w3.org/2000/svg" height="16" viewBox="0 -960 960 960" width="16" fill="currentColor"><path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h280v80H200Zm440-160-55-58 102-102H360v-80h327L585-622l55-58 200 200-200 200Z"/></svg>'+
   'ログアウト</button></div></div>';
  var a=document.getElementById('account-btn');if(a)a.innerHTML=avI();
  var av=getAv(myUid);if(av){var im=new Image();im.src=av;im.onload=function(){im.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:50%';var b=document.getElementById('account-btn');if(b){b.innerHTML='';b.appendChild(im)}}}
 }else{
  hr.innerHTML=tb+'<a href="/"><button class="btn">ログイン</button></a>';
 }
 var t=document.getElementById('theme-toggle');if(t)t.innerHTML=moonI();
 updateThemeIcon();
}

/* ── likes ── */
async function fetchLikes(ids){
 if(!ids.length)return;
 try{
  var r=await supa.from('likes').select('post_id,user_id').in('post_id',ids.map(String));
  if(!r.data)return;
  r.data.forEach(function(l){likeCache[l.post_id]=(likeCache[l.post_id]||0)+1;if(myUid&&l.user_id===myUid)myLikes[l.post_id]=true});
 }catch(e){console.error('fetchLikes:',e)}
}
async function togLike(pid){
 if(!myProfile){alert('ログインしてください');return}
 var el=document.querySelector('[data-post-id="'+pid+'"] .like-btn');
 var ce=document.querySelector('[data-post-id="'+pid+'"] .like-count');
 var ic=document.querySelector('[data-post-id="'+pid+'"] .like-icon');
 if(!el)return;
 var wasLiked=!!myLikes[pid];
 if(wasLiked){delete myLikes[pid];likeCache[pid]=Math.max(0,(likeCache[pid]||0)-1)}
 else{myLikes[pid]=true;likeCache[pid]=(likeCache[pid]||0)+1}
 el.classList.toggle('liked',!!myLikes[pid]);
 if(ic)ic.innerHTML=myLikes[pid]?heartI():heartOI();
 if(ce)ce.textContent=likeCache[pid]||'';
 try{
  var r;
  if(wasLiked){r=await supa.from('likes').delete().eq('user_id',myUid).eq('post_id',String(pid))}
  else{r=await supa.from('likes').insert([{user_id:myUid,post_id:String(pid)}])}
  if(r&&r.error)throw r.error;
 }catch(err){
  if(wasLiked){myLikes[pid]=true;likeCache[pid]=(likeCache[pid]||0)+1}
  else{delete myLikes[pid];likeCache[pid]=Math.max(0,(likeCache[pid]||0)-1)}
  el.classList.toggle('liked',!!myLikes[pid]);
  if(ic)ic.innerHTML=myLikes[pid]?heartI():heartOI();
  if(ce)ce.textContent=likeCache[pid]||'';
  alert('いいね保存失敗: '+(err.message||err));
 }
}

/* ── delete ── */
async function delPost(pid,isRoot){
 if(!confirm('この投稿を削除しますか？'))return;
 try{
  var r=await supa.from('posts').delete().eq('id',pid);
  if(r.error)throw r.error;
  if(isRoot){location.href='/'}
  else{var el=document.querySelector('[data-post-id="'+pid+'"]');if(el){el.style.opacity='0';setTimeout(function(){el.remove()},300)}}
 }catch(err){alert('削除に失敗しました: '+(err.message||err))}
}

/* ── prefetch avatars ── */
async function prefetchUids(posts){
 var hs=[...new Set(posts.map(function(p){return p.author_handle}).filter(Boolean))];
 var miss=hs.filter(function(h){return !uidCache[h]});if(!miss.length)return;
 var r=await supa.from('profiles').select('id,user_handle').in('user_handle',miss);
 if(r.data)r.data.forEach(function(p){uidCache[p.user_handle]=p.id});
}
function avSrcFor(handle){var uid=handle?uidCache[handle]:'';return uid?(supa.storage.from(BUCKET).getPublicUrl('profiles/'+uid+'/avatar').data.publicUrl+'?v='+Date.now()):null}

/* ── post card HTML ── */
function postCard(p,nested){
 var pa=splitContent(p.content);
 var imgH=pa.img?'<div class="post-image" style="margin-top:8px"><img src="'+esc(pa.img)+'" loading="lazy"></div>':'';
 var avSrc=avSrcFor(p.author_handle);
 var avH=avSrc?'<img src="'+esc(avSrc)+'" loading="lazy" onerror="avErr(this)">':avI();
 var liked=p.id&&myLikes[p.id];var lc=p.id?(likeCache[p.id]||0):0;
 var isOwn=myProfile&&p.author_handle===myProfile.user_handle;
 var likeH='<button class="action-btn like-btn'+(liked?' liked':'')+'" onclick="togLike(\''+ea(p.id)+'\')"><span class="like-icon">'+(liked?heartI():heartOI())+'</span><span class="like-count">'+(lc||'')+'</span></button>';
 var replyH='<button class="action-btn reply-btn" onclick="focusReply(\''+ea(p.id)+'\',\''+ea(p.author_handle||'')+'\')">'+replyI()+'返信</button>';
 var delH=isOwn?'<button class="action-btn delete-btn" onclick="delPost(\''+ea(p.id)+'\',false)">'+trashI()+'</button>':'';
 return '<div class="post-item'+(nested?' nested':'')+' reply-item" data-post-id="'+esc(p.id)+'" onclick="postItemClick(\''+esc(p.id)+'\',event)">'+
  '<div class="post-row">'+
  '<a href="/user/?@'+esc(p.author_handle||'')+'" class="post-avatar-sm">'+avH+'</a>'+
  '<div class="post-row-content">'+
  '<div class="post-meta">'+
  '<span class="post-name">'+esc(p.author||'ななし')+'</span>'+
  '<span class="post-handle">@'+esc(p.author_handle||'none')+'</span>'+
  '<span class="post-time" title="'+(p.created_at||'')+'">'+fmtD(p.created_at)+'</span>'+
  '</div>'+
  '<div class="post-body">'+autoLink(esc(pa.text))+'</div>'+imgH+
  '<div class="post-actions">'+replyH+likeH+delH+'</div>'+
  '</div></div></div>';
}

/* ── render thread ── */
function renderThread(){
 var rid=String(rootPost.id);
 /* build children map */
 var children={};
 allReplies.forEach(function(p){
  var parent=String(p.reply_to||rid);
  if(!children[parent])children[parent]=[];
  children[parent].push(p);
 });
 var totalRp=allReplies.length;
 /* root post */
 var rpa=splitContent(rootPost.content);
 var rImgH=rpa.img?'<div class="post-image" style="margin-top:10px"><img src="'+esc(rpa.img)+'" loading="lazy"></div>':'';
 var rAvSrc=avSrcFor(rootPost.author_handle);
 var rAvH=rAvSrc?'<img src="'+esc(rAvSrc)+'" loading="lazy" onerror="avErr(this)">':avI();
 var rLiked=myLikes[rootPost.id];var rLc=likeCache[rootPost.id]||0;
 var rIsOwn=myProfile&&rootPost.author_handle===myProfile.user_handle;
 var rLikeH='<button class="action-btn like-btn'+(rLiked?' liked':'')+'" onclick="togLike(\''+ea(rootPost.id)+'\')"><span class="like-icon">'+(rLiked?heartI():heartOI())+'</span><span class="like-count">'+(rLc||'')+'</span></button>';
 var rDelH=rIsOwn?'<button class="action-btn delete-btn" onclick="delPost(\''+ea(rootPost.id)+'\',true)">'+trashI()+'削除</button>':'';
 var rqpa=rootPost.repost_of?splitContent(rootPost.repost_content||''):null;
 var rqImgH=rqpa&&rqpa.img?'<div class="post-image" style="margin-top:8px"><img src="'+esc(rqpa.img)+'" loading="lazy"></div>':'';
 var quoteH=rootPost.repost_of?('<div class="repost-quote"><div class="repost-quote-meta"><b>'+esc(rootPost.repost_author||'')+'</b> @'+esc(rootPost.repost_handle||'')+'</div><div class="repost-quote-body">'+autoLink(esc(rqpa?rqpa.text||'':''))+'</div>'+rqImgH+'</div>'):'';

 var rRecoroLabel=rootPost.repost_of?'<div class="recoro-label">'+repostI()+' リコロ</div>':'';
 var html='<div class="thread-root" data-post-id="'+esc(rootPost.id)+'" >'+
  rRecoroLabel+
  '<div class="post-row" style="align-items:flex-start;gap:12px">'+
  '<a href="/user/?@'+esc(rootPost.author_handle||'')+'" class="thread-root-av">'+rAvH+'</a>'+
  '<div style="flex:1">'+
  '<div class="post-meta" style="margin-bottom:6px">'+
  '<span class="post-name" style="font-size:16px">'+esc(rootPost.author||'ななし')+'</span>'+
  '<span class="post-handle">@'+esc(rootPost.author_handle||'')+'</span>'+
  '</div></div></div>'+
  '<div class="post-body" style="font-size:18px;line-height:1.7;margin-top:10px;padding:0 2px">'+autoLink(esc(rpa.text))+'</div>'+
  quoteH+rImgH+
  '<div class="post-time" style="display:block;margin-top:12px;color:var(--muted);font-size:13px;padding-top:10px;border-top:1px solid var(--border)">'+fmtFull(rootPost.created_at)+'</div>'+
  '<div class="post-actions" style="padding-top:4px;border-top:1px solid var(--border);margin-top:4px">'+rLikeH+rDelH+'</div>'+
  '</div>';

 /* inline reply compose */
 html+=renderInlineReply(rid,'');

 /* replies section */
 if(totalRp>0){html+='<div class="thread-reply-label">'+totalRp+'件の返信</div>'}

 /* top-level replies */
 var topReplies=children[rid]||[];
 topReplies.forEach(function(p){
  html+=postCard(p,false);
  var nested=children[String(p.id)]||[];
  if(nested.length>0){
   /* expand button */
   html+='<button class="expand-replies-btn" id="expbtn-'+esc(p.id)+'" onclick="expandReplies(\''+ea(p.id)+'\')">'+
    '▶ '+nested.length+'件の返信を表示</button>';
   /* hidden nested replies */
   html+='<div id="nested-'+esc(p.id)+'" style="display:none">';
   nested.forEach(function(np){
    html+=postCard(np,true);
    /* reply-to-reply compose placeholder */
   });
   /* nested reply compose */
   html+=renderInlineReply(String(p.id),'nested-reply-bar-'+esc(p.id));
   html+='</div>';
  }
 });

 if(topReplies.length===0&&totalRp===0){
  html+='<div class="load-more-msg">まだ返信がありません。最初に返信しましょう！</div>'
 }

 document.getElementById('thread-wrap').innerHTML=html;
}

function expandReplies(pid){
 var nd=document.getElementById('nested-'+pid);
 var btn=document.getElementById('expbtn-'+pid);
 if(!nd||!btn)return;
 nd.style.display='block';btn.style.display='none';
}

function renderInlineReply(targetId,wrapId){
 if(!myProfile)return'';
 var avSrc=getAv(myUid)||'';
 var avH=avSrc?'<img src="'+esc(avSrc)+'" loading="lazy" onerror="avErr(this)">':avI();
 var wid=wrapId||('reply-bar-'+targetId);
 return '<div class="inline-reply-bar" id="'+esc(wid)+'">'+
  '<div class="inline-reply-av">'+avH+'</div>'+
  '<div style="flex:1">'+
  '<textarea id="ta-'+esc(targetId)+'" placeholder="返信する..." rows="1" style="width:100%;resize:none;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit;font-size:14px;padding:8px 11px;outline:none;min-height:40px;" onfocus="this.rows=3" onblur="if(!this.value)this.rows=1"></textarea>'+
  '<div style="display:flex;justify-content:flex-end;margin-top:6px">'+
  '<button class="btn" style="font-size:13px;padding:5px 14px" onclick="doReply(\''+ea(targetId)+'\')">返信する</button>'+
  '</div></div></div>';
}

/* ── focus reply ── */
function focusReply(targetId,handle){
 var rootId=String(rootPost.id);
 /* check static textarea */
 var sta=document.getElementById('ta-'+targetId);
 if(sta){sta.focus();sta.placeholder='@'+handle+' に返信...';return}
 /* check existing dynamic bar */
 var dyn=document.getElementById('dynreply-'+targetId);
 if(dyn){var dt=dyn.querySelector('textarea');if(dt){dt.focus();dt.placeholder='@'+handle+' に返信...';}return}
 /* create dynamic bar below the target post */
 if(!myProfile)return;
 var postEl=document.querySelector('[data-post-id="'+targetId+'"]');
 if(!postEl)return;
 var avs=getAv(myUid)||'';
 var avh=avs?'<img src="'+esc(avs)+'" loading="lazy" onerror="avErr(this)">':avI();
 var bar=document.createElement('div');
 bar.className='inline-reply-bar';bar.id='dynreply-'+targetId;
 bar.innerHTML='<div class="inline-reply-av">'+avh+'</div>'+
  '<div style="flex:1">'+
  '<textarea id="ta-'+targetId+'" placeholder="@'+handle+' に返信..." rows="3" style="width:100%;resize:none;border:1.5px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-family:inherit;font-size:14px;padding:8px 11px;outline:none;min-height:40px;"></textarea>'+
  '<div style="display:flex;justify-content:flex-end;margin-top:6px">'+
  '<button class="btn" style="font-size:13px;padding:5px 14px" onclick="doReply(\''+targetId+'\')">返信する</button>'+
  '</div></div>';
 postEl.after(bar);
 var nt=document.getElementById('ta-'+targetId);if(nt)nt.focus();
}

/* ── submit reply ── */
async function doReply(targetId){
 if(!myProfile){alert('ログインしてください');return}
 var ta=document.getElementById('ta-'+targetId);
 if(!ta)return;
 var txt=ta.value.trim();if(!txt)return;
 var rootId=String(rootPost.id);
 var actualRoot=targetId===rootId?rootId:rootId; /* always root */
 var btn=ta.parentElement.querySelector('button');if(btn)btn.disabled=true;
 try{
  var ins=await supa.from('posts').insert([{
   content:txt,
   author:myProfile.display_name,
   author_handle:myProfile.user_handle,
   reply_to:String(targetId),
   root_id:rootId
  }]).select();
  if(ins.error)throw ins.error;
  ta.value='';ta.rows=1;
  var np=ins.data[0];
  allReplies.push(np);
  likeCache[np.id]=0;
  /* insert into DOM immediately */
  var newCard=document.createElement('div');newCard.innerHTML=postCard(np,targetId!==rootId);
  var newEl=newCard.firstChild;
  if(targetId===rootId){
   var sb=document.getElementById('reply-bar-'+rootId);if(sb)sb.parentElement.insertBefore(newEl,sb);
  }else{
   var nd=document.getElementById('nested-'+targetId);
   var dynB=document.getElementById('dynreply-'+targetId);
   if(nd){var nb=nd.querySelector('.inline-reply-bar');if(nb)nd.insertBefore(newEl,nb);else nd.appendChild(newEl)}
   else if(dynB){dynB.parentElement.insertBefore(newEl,dynB);dynB.remove()}
   else{var pe=document.querySelector('[data-post-id="'+targetId+'"]');if(pe&&pe.parentNode)pe.parentNode.insertBefore(newEl,pe.nextSibling)}
  }
  /* update reply label */
  var lbl=document.querySelector('.thread-reply-label');
  if(lbl){lbl.textContent=allReplies.length+'件の返信'}
 }catch(err){alert('返信に失敗しました: '+(err.message||err))}
 if(btn)btn.disabled=false;
}

/* ── image compress ── */
async function compressImg(file){
 if(!(file instanceof File)||file.size<=MAX_IMG)return file;
 var bm=await createImageBitmap(file);var w=bm.width,h=bm.height;
 if(Math.max(w,h)>1920){var r=1920/Math.max(w,h);w=Math.round(w*r);h=Math.round(h*r)}
 var cv=document.createElement('canvas');cv.width=w;cv.height=h;var cx=cv.getContext('2d');cx.drawImage(bm,0,0,w,h);
 var q=0.9,bl=null;
 for(var i=0;i<8;i++){bl=await new Promise(function(res){cv.toBlob(res,'image/jpeg',q)});if(!bl||bl.size<=MAX_IMG)break;q-=0.1}
 if(!bl)return file;return new File([bl],file.name.replace(/\.[^.]+$/,'')+'.jpg',{type:'image/jpeg'});
}

function show404(){document.getElementById('thread-wrap').innerHTML='<div class="not-found"><h2>見つかりません</h2><p>この投稿は存在しないか削除されました。</p><a href="/"><button class="btn">ホームへ戻る</button></a></div>'}

init();
