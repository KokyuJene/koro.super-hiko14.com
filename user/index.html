/* ── toast ── */
function showToast(msg,type){

 if(!t){t=document.createElement('div');t.id='koro-toast';document.body.appendChild(t)}
 t.className=type||'';t.textContent=msg;

}

/* ── scroll helpers ── */
function isAtBottom(){return window.scrollY+window.innerHeight>=document.documentElement.scrollHeight-100}

/* ── url ── */
function getHandle(){
 var s=location.search.slice(1);if(!s)return null;
 var p=new URLSearchParams(s);if(p.has('handle'))return p.get('handle').replace(/^@/,'');
 var fk=Array.from(p.keys())[0]||'';
 return fk.startsWith('@')?fk.slice(1):(fk||null);
}

/* ── init ── */
async function init(){
 var s=(await supa.auth.getSession()).data.session;mySession=s;
 if(s){myUid=s.user.id;var r=await supa.from('profiles').select('user_handle').eq('id',s.user.id).single();myHandle=r.data?r.data.user_handle:null}
 renderHeader(s);

 if(!handle){showNF('URLにハンドルが指定されていません');return}

/* ── realtime ── */
function subscribeRT(handle,profId){
 var avUrl=profId?(supa.storage.from(BUCKET).getPublicUrl('profiles/'+profId+'/avatar').data.publicUrl+'?v='+Date.now()):'';
 supa.channel('user-timeline').on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},async function(payload){
  var p=payload.new;if(!p||!p.id)return;
  if(p.author_handle!==handle)return;
  var tl=document.getElementById('user-timeline');if(!tl)return;
  var empty=tl.querySelector('.load-more-msg');if(empty)empty.remove();
  var pa=splitContent(p.content);
  var imgH=pa.img?'<div class="post-image"><img src="'+esc(pa.img)+'" loading="lazy"></div>':'';
  var avH=avUrl?'<img src="'+esc(avUrl)+'" loading="lazy" onerror="avErr(this)">':avI();
  var isOwn=myHandle&&myHandle===p.author_handle;
  var delH=isOwn&&p.id?'<button class="action-btn delete-btn" onclick="delPost(\''+esc(p.id)+'\')">'+ trashI()+'</button>':'';
  var likeH=p.id?'<button class="action-btn like-btn" onclick="togLike(\''+esc(p.id)+'\')" ><span class="like-icon">'+heartOI()+'</span><span class="like-count"></span></button>':'';
  var replyH=p.id?('<a class="action-btn reply-btn" href="/post/?id='+esc(p.id)+'">'+replyI()+'</a>'):'';
  var qpa=p.repost_of?splitContent(p.repost_content||''):null;
  var quoteImgH=qpa&&qpa.img?'<div class="post-image" style="margin-top:6px"><img src="'+esc(qpa.img)+'" loading="lazy"></div>':'';
  var quoteH=p.repost_of?('<div class="repost-quote"><div class="repost-quote-meta"><b>'+esc(p.repost_author||'')+'</b> @'+esc(p.repost_handle||'')+'</div><div class="repost-quote-body">'+autoLink(esc(qpa?qpa.text||'':''))+'</div>'+quoteImgH+'</div>'):'';
  var recoroLabel=p.repost_of?'<div class="recoro-label">'+repostI()+' リコロ</div>':'';
  var h='<div class="post-item"'+(p.id?' data-post-id="'+esc(p.id)+'"':'')+(p.repost_of?' style="border-left:3px solid #00ba7c"':'')+(p.id?' onclick="postItemClick(\''+esc(p.id)+'\',event)"':'')+'>'+recoroLabel+'<div class="post-row"><a href="/user/?@'+esc(p.author_handle||'')+'" class="post-avatar-sm">'+avH+'</a><div class="post-row-content"><div class="post-meta"><span class="post-name">'+esc(p.author||'ななし')+'</span><span class="post-handle">@'+esc(p.author_handle||'none')+'</span><span class="post-time" title="'+(p.created_at||'')+'">'+fmtD(p.created_at)+'</span></div>'+(pa.text?'<div class="post-body">'+autoLink(esc(pa.text))+'</div>':'')+quoteH+imgH+'<div class="post-actions">'+replyH+likeH+delH+'</div></div></div></div>';
  var div=document.createElement('div');div.innerHTML=h;
  var atBottom=isAtBottom();tl.appendChild(div.firstChild);
  if(atBottom)scrollToBottom();
  try{new Audio('../oto.mp3').play().catch(function(){});}catch(ex){}
 }).on('postgres_changes',{event:'INSERT',schema:'public',table:'likes'},function(payload){
  var l=payload.new;if(!l||!l.post_id)return;
  if(myProfile&&l.user_id===myProfile.id)return; /* 自分のいいね: optimistic済みでスキップ */
  var pid=String(l.post_id);
  likeCache[pid]=(likeCache[pid]||0)+1;
  var el=document.querySelector('[data-post-id="'+pid+'"] .like-count');
  if(el)el.textContent=likeCache[pid]||'';
  var btn=document.querySelector('[data-post-id="'+pid+'"] .like-btn');
  if(btn){var ic=btn.querySelector('.like-icon');if(ic)ic.innerHTML=heartI();btn.classList.add('liked')}
 }).on('postgres_changes',{event:'DELETE',schema:'public',table:'likes'},function(payload){
  var l=payload.old;if(!l||!l.post_id)return;
  if(myProfile&&l.user_id===myProfile.id)return;
  var pid=String(l.post_id);
  likeCache[pid]=Math.max(0,(likeCache[pid]||0)-1);
  var el=document.querySelector('[data-post-id="'+pid+'"] .like-count');
  if(el)el.textContent=likeCache[pid]||'';
 }).on('postgres_changes',{event:'DELETE',schema:'public',table:'posts'},function(payload){
  var pid=payload.old.id;if(!pid)return;
  var el=document.querySelector('[data-post-id="'+pid+'"]');
  if(el){el.style.opacity='0';setTimeout(function(){el.remove()},300)}
 }).subscribe();
}

  var ph=myHandle?('/user/?@'+myHandle):'/user/';
  var eh=myHandle?('/user/?@'+myHandle+'#edit'):'/user/#edit';
  hr.innerHTML=tb+
   '<div class="account-wrap">'+
   '<button class="account-btn" id="account-btn" onclick="toggleDD(event)"></button>'+
   '<div class="account-dropdown" id="account-dropdown">'+
   '<a class="dropdown-item" href="'+esc(ph)+'">'+avI()+'プロフィール</a>'+
   '<a class="dropdown-item" href="'+esc(eh)+'">'+pencilI()+'プロフィール編集</a>'+
   '<button class="dropdown-item danger" onclick="supa.auth.signOut().then(function(){location.href=\'/\'})"><svg xmlns="http://www.w3.org/2000/svg" height="16" viewBox="0 -960 960 960" width="16" fill="currentColor"><path d="M200-120q-33 0-56.5-23.5T120-200v-560q0-33 23.5-56.5T200-840h280v80H200v560h280v80H200Zm440-160-55-58 102-102H360v-80h327L585-622l55-58 200 200-200 200Z"/></svg>ログアウト</button>'+
   '</div></div>';
  var a=document.getElementById('account-btn');if(a)a.innerHTML=avI();
  updateAccAvatar(session.user.id);
 }else{
  hr.innerHTML=tb+'<a href="/"><button class="btn">ログイン</button></a>';
 }
 updateThemeIcon();

function updateAccAvatar(uid){
 var b=document.getElementById('account-btn');if(!b)return;
 var d=supa.storage.from(BUCKET).getPublicUrl('profiles/'+uid+'/avatar');
 if(!d.data||!d.data.publicUrl)return;
 var im=new Image();im.src=d.data.publicUrl+'?v='+Date.now();
 im.onerror=function(){};
 im.onload=function(){im.style.cssText='width:100%;height:100%;object-fit:cover;border-radius:50%';b.innerHTML='';b.appendChild(im)};
}

/* ── load profile ── */
async function loadProfile(handle){
 var r=await supa.from('profiles').select('*').eq('user_handle',handle).single();
 if(r.error||!r.data){showNF('@'+handle+' は見つかりませんでした');return}
 var prof=r.data;viewProfile=prof;
 document.title=prof.display_name+' (@'+prof.user_handle+') - Koro';
 var pc=(await supa.from('posts').select('*',{count:'exact',head:true}).eq('author_handle',handle)).count||0;
 var fersR=await supa.from('follows').select('*',{count:'exact',head:true}).eq('following_id',prof.id);
 var fingR=await supa.from('follows').select('*',{count:'exact',head:true}).eq('follower_id',prof.id);
 var fersCount=fersR.count||0;var fingCount=fingR.count||0;
 var isOwn=myHandle&&myHandle===prof.user_handle;
 var isFollowing=false;
 if(myUid&&!isOwn){try{var fr=await supa.from('follows').select('id').eq('follower_id',myUid).eq('following_id',prof.id).single();isFollowing=!!(fr.data)}catch(e){}}
 var avUrl=getStorUrl('profiles/'+prof.id+'/avatar');
 var hdUrl=getStorUrl('profiles/'+prof.id+'/header');
 var actionBtn='';
 if(isOwn){
  actionBtn='<button class="profile-edit-btn" title="プロフィール編集" onclick="toggleEdit()">'+pencilI()+'</button>';
 }else if(myUid){
  if(isFollowing){actionBtn='<button class="follow-btn following" id="follow-btn" onclick="toggleFollow(\''+esc(prof.id)+'\')"><span class="ftxt">フォロー中</span><span class="ftxt-h">フォロー解除</span></button>'}
  else{actionBtn='<button class="follow-btn" id="follow-btn" onclick="toggleFollow(\''+esc(prof.id)+'\')">フォロー</button>'}
 }
 var editPanel=isOwn?
  '<div class="profile-edit-panel" id="edit-panel">'+
  '<label class="field-label">表示名</label>'+
  '<input class="field" id="edit-name" type="text" value="'+esc(prof.display_name)+'" placeholder="表示名">'+
  '<label class="field-label">アイコン画像</label>'+
  '<div class="edit-img-row"><label class="edit-img-label">'+imgI()+'アイコン選択<input type="file" accept="image/*" onchange="onSelAv(event)"></label><span id="edit-av-nm" class="hint"></span></div>'+
  '<label class="field-label">ヘッダー画像</label>'+
  '<div class="edit-img-row"><label class="edit-img-label">'+imgI()+'ヘッダー選択<input type="file" accept="image/*" onchange="onSelHd(event)"></label><span id="edit-hd-nm" class="hint"></span></div>'+
  '<p class="hint">2MB超は自動圧縮されます。</p>'+
  '<button class="btn" style="margin-top:14px;width:100%" onclick="saveEdit(\''+esc(prof.id)+'\')">保存する</button></div>':'';
 /* set verified cache */
 if(prof.verified)verifiedCache[prof.user_handle]=true;
 document.getElementById('profile-area').innerHTML=
  '<div class="posts-list" id="posts-list">'+
  '<div class="section-label">ころっと</div>'+
  '<div id="user-timeline"><div class="load-more-msg">読み込み中...</div></div></div>'+
  '<div class="profile-card">'+
  '<div class="profile-banner"><img class="profile-banner-img" src="'+esc(hdUrl)+'" loading="lazy" onerror="this.style.display=\'none\'"></div>'+
  '<div class="profile-body">'+
  '<div class="profile-top-row">'+
  '<div class="profile-avatar"><img class="profile-avatar-img" src="'+esc(avUrl)+'" loading="lazy" onerror="avErr(this)"></div>'+
  actionBtn+
  '</div>'+
  '<div class="profile-info">'+
  '<div class="profile-name">'+esc(prof.display_name)+(prof.verified?' '+verifyI():'')+'</div>'+
  '<div class="profile-handle">@'+esc(prof.user_handle)+'</div>'+
  (prof.bio?'<div class="profile-bio">'+esc(prof.bio)+'</div>':'')+
  '</div>'+
  '<div class="profile-stats">'+
  '<span class="profile-stat"><b>'+pc+'</b> ころっと</span>'+
  '<span class="profile-stat"><b>'+fingCount+'</b> フォロー</span>'+
  '<span class="profile-stat follow-stat-fers"><b>'+fersCount+'</b> フォロワー</span>'+
  '</div></div>'+editPanel+'</div>';
 await loadUserPosts(handle,prof.id);
 /* 投稿一覧の一番下へスクロール */
 requestAnimationFrame(scrollToBottom);
}

/* ── follow ── */
async function toggleFollow(targetId){
 if(!myUid)return;
 var btn=document.getElementById('follow-btn');if(!btn)return;
 btn.disabled=true;
 try{
  if(btn.classList.contains('following')){
   var r=await supa.from('follows').delete().eq('follower_id',myUid).eq('following_id',targetId);
   if(r.error)throw r.error;
   btn.className='follow-btn';btn.innerHTML='フォロー';
  }else{
   var r=await supa.from('follows').insert([{follower_id:myUid,following_id:targetId}]);
   if(r.error)throw r.error;
   btn.className='follow-btn following';btn.innerHTML='<span class="ftxt">フォロー中</span><span class="ftxt-h">フォロー解除</span>';
  }
  var fc=await supa.from('follows').select('*',{count:'exact',head:true}).eq('following_id',targetId);
  var stat=document.querySelector('.follow-stat-fers');
  if(stat)stat.innerHTML='<b>'+(fc.count||0)+'</b> フォロワー';
 }catch(e){console.error('err:',e);showToast('エラーが発生しました','error')}
 btn.disabled=false;
}

/* ── edit ── */
function toggleEdit(){var p=document.getElementById('edit-panel');if(p)p.classList.toggle('open')}
function onSelAv(e){editAvFile=e.target.files?e.target.files[0]:null;var s=document.getElementById('edit-av-nm');if(s)s.textContent=editAvFile?editAvFile.name:''}
function onSelHd(e){editHdFile=e.target.files?e.target.files[0]:null;var s=document.getElementById('edit-hd-nm');if(s)s.textContent=editHdFile?editHdFile.name:''}
async function saveEdit(uid){
 var nm=document.getElementById('edit-name').value.trim();
 if(!nm)showToast('表示名を入力してください');return;
 var btn=document.querySelector('#edit-panel .btn');if(btn)btn.disabled=true;
 try{
  if(editAvFile)await uploadImg(editAvFile,'profiles/'+uid+'/avatar');
  if(editHdFile)await uploadImg(editHdFile,'profiles/'+uid+'/header');
  var r=await supa.from('profiles').update({display_name:nm}).eq('id',uid);
  if(r.error)throw r.error;
  editAvFile=null;editHdFile=null;showToast('プロフィールを更新しました','success');setTimeout(function(){location.reload()},1000);
 }catch(err){console.error('update:',err);showToast('更新できませんでした','error');if(btn)btn.disabled=false}
}

/* ── like (bug fixed: error handling + revert) ── */
async function fetchLikes(ids){
 if(!ids.length)return;
 try{
  var r=await supa.from('likes').select('post_id,user_id').in('post_id',ids.map(String));
  if(!r.data)return;
  r.data.forEach(function(l){likeCache[l.post_id]=(likeCache[l.post_id]||0)+1;if(myUid&&l.user_id===myUid)myLikes[l.post_id]=true});
 }catch(e){console.error('fetchLikes:',e)}
}
async function togLike(pid){
 if(!myUid){showToast('ログインしてください');return}
 var el=document.querySelector('[data-post-id="'+pid+'"] .like-btn');
 var ce=document.querySelector('[data-post-id="'+pid+'"] .like-count');
 var ic=document.querySelector('[data-post-id="'+pid+'"] .like-icon');
 if(!el)return;
 var wasLiked=!!myLikes[pid];
 if(wasLiked){delete myLikes[pid];likeCache[pid]=Math.max(0,(likeCache[pid]||0)-1)}
 else{myLikes[pid]=true;likeCache[pid]=(likeCache[pid]||0)+1}
 el.classList.toggle('liked',!!myLikes[pid]);
 if(ic)ic.innerHTML=myLikes[pid]?heartI():heartOI();
 if(ce)ce.textContent=likeCache[pid]||'';
 try{
  var r;
  if(wasLiked){r=await supa.from('likes').delete().eq('user_id',myUid).eq('post_id',String(pid))}
  else{r=await supa.from('likes').insert([{user_id:myUid,post_id:String(pid)}])}
  if(r&&r.error)throw r.error;
 }catch(err){
  console.error('like error:',err);
  console.error('like:',err);showToast('いいねできませんでした','error');
  if(wasLiked){myLikes[pid]=true;likeCache[pid]=(likeCache[pid]||0)+1}
  else{delete myLikes[pid];likeCache[pid]=Math.max(0,(likeCache[pid]||0)-1)}
  el.classList.toggle('liked',!!myLikes[pid]);
  if(ic)ic.innerHTML=myLikes[pid]?heartI():heartOI();
  if(ce)ce.textContent=likeCache[pid]||'';
 }
}
async function delPost(pid){
 if(!confirm('この投稿を削除しますか？'))return;
 try{var r=await supa.from('posts').delete().eq('id',pid);if(r.error)throw r.error;var el=document.querySelector('[data-post-id="'+pid+'"]');if(el){el.style.transition='opacity .3s';el.style.opacity='0';setTimeout(function(){el.remove()},320)}}
 catch(err){console.error('del:',err);showToast('削除できませんでした','error')}
}

/* ── user posts ── */
async function loadUserPosts(handle,profId){
 var r=await supa.from('posts').select('*').eq('author_handle',handle).order('created_at',{ascending:true});
 var tl=document.getElementById('user-timeline');
 if(r.error){tl.innerHTML='<div class="load-more-msg">読み込みエラー</div>';return}
 if(!r.data||!r.data.length){tl.innerHTML='<div class="load-more-msg">まだころっとがありません</div>';return}
 var ids=r.data.map(function(p){return p.id}).filter(Boolean);
 await fetchLikes(ids);
 var avSrc=profId?(supa.storage.from(BUCKET).getPublicUrl('profiles/'+profId+'/avatar').data.publicUrl+'?v='+Date.now()):'';
 tl.innerHTML=r.data.map(function(p){
  var pa=splitContent(p.content);
  var imgH=pa.img?'<div class="post-image"><img src="'+esc(pa.img)+'" loading="lazy"></div>':'';
  var avH=avSrc?'<img src="'+esc(avSrc)+'" loading="lazy" onerror="avErr(this)">':avI();
  var liked=p.id&&myLikes[p.id];var lc=p.id?(likeCache[p.id]||0):0;
  var isOwn=myHandle&&myHandle===p.author_handle;
  var delH=isOwn&&p.id?'<button class="action-btn delete-btn" onclick="delPost(\''+esc(p.id)+'\')">'+ trashI()+'</button>':'';
  var likeH=p.id?'<button class="action-btn like-btn'+(liked?' liked':'')+' " onclick="togLike(\''+esc(p.id)+'\')" ><span class="like-icon">'+(liked?heartI():heartOI())+'</span><span class="like-count">'+(lc||'')+'</span></button>':'';
  var replyH=p.id?('<a class="action-btn reply-btn" href="/post/?id='+esc(p.id)+'">'+replyI()+'</a>'):'';
  var qpa=p.repost_of?splitContent(p.repost_content||''):null;
  var quoteImgH=qpa&&qpa.img?'<div class="post-image" style="margin-top:6px"><img src="'+esc(qpa.img)+'" loading="lazy"></div>':'';
  var quoteH=p.repost_of?('<div class="repost-quote"><div class="repost-quote-meta"><b>'+esc(p.repost_author||'')+'</b> @'+esc(p.repost_handle||'')+'</div><div class="repost-quote-body">'+autoLink(esc(qpa?qpa.text||'':''))+'</div>'+quoteImgH+'</div>'):'';
  var recoroLabel=p.repost_of?'<div class="recoro-label">'+repostI()+' リコロ</div>':'';
  return '<div class="post-item"'+(p.id?' data-post-id="'+esc(p.id)+'"':'')+
   (p.repost_of?' style="border-left:3px solid #00ba7c"':'')+
   (p.id?' onclick="postItemClick(\''+esc(p.id)+'\',event)"':'')+'>'+
   recoroLabel+
   '<div class="post-row">'+
   '<a href="/user/?@'+esc(p.author_handle||'')+'" class="post-avatar-sm">'+avH+'</a>'+
   '<div class="post-row-content">'+
   '<div class="post-meta">'+
   '<span class="post-name">'+esc(p.author||'ななし')+(verifiedCache[p.author_handle]?' '+verifyI():'')+'</span>'+
   '<span class="post-handle">@'+esc(p.author_handle||'none')+'</span>'+
   '<span class="post-time" title="'+(p.created_at||'')+'">'+fmtD(p.created_at)+'</span>'+
   '</div>'+(pa.text?'<div class="post-body">'+autoLink(esc(pa.text))+'</div>':'')+quoteH+imgH+
   '<div class="post-actions">'+replyH+likeH+delH+'</div>'+
   '</div></div></div>';
 }).join('');
 requestAnimationFrame(scrollToBottom);
}

/* ── image ── */
async function compressImg(file){
 if(!(file instanceof File)||file.size<=MAX_IMG)return file;
 var bm=await createImageBitmap(file);var w=bm.width,h=bm.height;
 if(Math.max(w,h)>1920){var rat=1920/Math.max(w,h);w=Math.round(w*rat);h=Math.round(h*rat)}
 var cv=document.createElement('canvas');cv.width=w;cv.height=h;var cx=cv.getContext('2d');cx.drawImage(bm,0,0,w,h);
 var q=0.9,bl=null;
 for(var i=0;i<8;i++){bl=await new Promise(function(res){cv.toBlob(res,'image/jpeg',q)});if(!bl||bl.size<=MAX_IMG)break;q-=0.1;if(q<0.35){var nw=Math.round(cv.width*.88),nh=Math.round(cv.height*.88);var t=document.createElement('canvas');t.width=nw;t.height=nh;t.getContext('2d').drawImage(cv,0,0,nw,nh);cv.width=nw;cv.height=nh;cx.clearRect(0,0,nw,nh);cx.drawImage(t,0,0);q=0.8}}
 if(!bl)return file;return new File([bl],file.name.replace(/\.[^.]+$/,'')+'.jpg',{type:'image/jpeg'});
}
async function uploadImg(file,path){
 var opt=await compressImg(file);
 var r=await supa.storage.from(BUCKET).upload(path,opt,{upsert:true,contentType:opt.type||'image/jpeg'});
 if(r.error)throw r.error;
 return supa.storage.from(BUCKET).getPublicUrl(path).data.publicUrl+'?v='+Date.now();
}

/* ── util ── */
function splitContent(raw){var c=String(raw||'');var m=c.match(/\n?\n?\[img\](https?:\/\/[^\s]+)\[\/img\]\s*$/);if(!m)return{text:c,img:''};return{text:c.replace(/\n?\n?\[img\](https?:\/\/[^\s]+)\[\/img\]\s*$/,'').trim(),img:m[1]}}
function getStorUrl(path){return supa.storage.from(BUCKET).getPublicUrl(path).data.publicUrl+'?v='+Date.now()}
function showNF(msg){document.getElementById('profile-area').innerHTML='<div class="not-found"><h2>見つかりません</h2><p>'+esc(msg)+'</p><a href="/"><button class="btn">ホームへ戻る</button></a></div>'}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function fmtD(iso){if(!iso)return'';var d=new Date(iso),n=new Date(),s=(n-d)/1000;if(s<60)return Math.floor(s)+'秒前';if(s<3600)return Math.floor(s/60)+'分前';if(s<86400)return Math.floor(s/3600)+'時間前';return(d.getMonth()+1)+'/'+(d.getDate())}
function autoLink(txt){return txt.replace(/(https?:\/\/[^\s<&]+)/g,'<a class="auto-link" href="$1" target="_blank" rel="noopener">$1</a>')}

init();
</script>
