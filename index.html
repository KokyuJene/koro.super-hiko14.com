/* ── post utils ── */
function e(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function ea(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;')}
function fmtD(iso){if(!iso)return'';var d=new Date(iso),n=new Date(),s=(n-d)/1000;if(s<60)return Math.floor(s)+'秒前';if(s<3600)return Math.floor(s/60)+'分前';if(s<86400)return Math.floor(s/3600)+'時間前';return(d.getMonth()+1)+'/'+(d.getDate())}
function autoLink(txt){return txt.replace(/(https?:\/\/[^\s<&]+)/g,'<a class="auto-link" href="$1" target="_blank" rel="noopener">$1</a>')}
function splitContent(raw){var c=String(raw||'');var m=c.match(/\n?\n?\[img\](https?:\/\/[^\s]+)\[\/img\]\s*$/);if(!m)return{text:c,img:''};return{text:c.replace(/\n?\n?\[img\](https?:\/\/[^\s]+)\[\/img\]\s*$/,'').trim(),img:m[1]}}

/* ── char counter ── */
function updateCC(){var ta=document.getElementById('post-text'),cc=document.getElementById('char-counter');if(!ta||!cc)return;var r=MAX_CHARS-[...ta.value].length;cc.textContent=r;cc.className='char-counter'+(r<=20?(r<0?' over':' warn'):'');ta.style.height='auto';ta.style.height=Math.min(ta.scrollHeight,150)+'px'}
function ctrlEnter(e){if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();doPost()}}

/* ── image ── */
function onSelImg(ev){selectedImg=ev.target.files?ev.target.files[0]:null;var nm=document.getElementById('sel-nm'),cb=document.getElementById('clear-img-btn');if(nm)nm.textContent=selectedImg?selectedImg.name:'';if(cb)cb.style.display=selectedImg?'':'none'}
function clearImg(){selectedImg=null;var nm=document.getElementById('sel-nm'),cb=document.getElementById('clear-img-btn'),fi=document.querySelector('input[type=file]');if(nm)nm.textContent='';if(cb)cb.style.display='none';if(fi)fi.value=''}
async function compressImg(file){
 if(!(file instanceof File)||file.size<=MAX_IMG)return file;
 var bm=await createImageBitmap(file);var w=bm.width,h=bm.height;
 if(Math.max(w,h)>1920){var r=1920/Math.max(w,h);w=Math.round(w*r);h=Math.round(h*r)}
 var cv=document.createElement('canvas');cv.width=w;cv.height=h;var cx=cv.getContext('2d');cx.drawImage(bm,0,0,w,h);
 var q=0.9,bl=null;
 for(var i=0;i<8;i++){bl=await new Promise(function(res){cv.toBlob(res,'image/jpeg',q)});if(!bl||bl.size<=MAX_IMG)break;q-=0.1;if(q<0.35){var nw=Math.round(cv.width*.88),nh=Math.round(cv.height*.88);var t2=document.createElement('canvas');t2.width=nw;t2.height=nh;t2.getContext('2d').drawImage(cv,0,0,nw,nh);cv.width=nw;cv.height=nh;cx.clearRect(0,0,nw,nh);cx.drawImage(t2,0,0);q=0.8}}
 if(!bl)return file;return new File([bl],file.name.replace(/\.[^.]+$/,'')+'.jpg',{type:'image/jpeg'});
}
async function uploadImg(file,path){
 var opt=await compressImg(file);
 var r=await supa.storage.from(BUCKET).upload(path,opt,{upsert:true,contentType:opt.type||'image/jpeg'});
 if(r.error)throw r.error;
 return supa.storage.from(BUCKET).getPublicUrl(path).data.publicUrl+'?v='+Date.now();
}

/* ── fetch likes ── */
async function fetchLikes(ids){
 if(!ids.length)return;
 try{
  var r=await supa.from('likes').select('post_id,user_id').in('post_id',ids.map(String));
  if(!r.data)return;
  r.data.forEach(function(l){likeCache[l.post_id]=(likeCache[l.post_id]||0)+1;if(myProfile&&l.user_id===myProfile.id)myLikes[l.post_id]=true});
 }catch(e){console.error('fetchLikes:',e)}
}

/* ── prefetch avatars ── */
async function prefetchUids(posts){
 var hs=[...new Set(posts.map(function(p){return p.author_handle}).filter(Boolean))];
 var miss=hs.filter(function(h){return !uidCache[h]});if(!miss.length)return;
 var r=await supa.from('profiles').select('id,user_handle').in('user_handle',miss);
 if(r.data)r.data.forEach(function(p){uidCache[p.user_handle]=p.id});
}

/* ── like toggle (bug fixed: revert on error) ── */
async function togLike(pid){
 if(!myProfile){alert('ログインしてください');return}
 var el=document.querySelector('[data-post-id="'+pid+'"] .like-btn');
 var ce=document.querySelector('[data-post-id="'+pid+'"] .like-count');
 var ic=document.querySelector('[data-post-id="'+pid+'"] .like-icon');
 if(!el)return;
 var wasLiked=!!myLikes[pid];
 /* optimistic update */
 if(wasLiked){delete myLikes[pid];likeCache[pid]=Math.max(0,(likeCache[pid]||0)-1)}
 else{myLikes[pid]=true;likeCache[pid]=(likeCache[pid]||0)+1}
 el.classList.toggle('liked',!!myLikes[pid]);
 if(ic)ic.innerHTML=myLikes[pid]?heartI():heartOI();
 if(ce)ce.textContent=likeCache[pid]||'';
 /* actual DB write */
 try{
  var r;
  if(wasLiked){r=await supa.from('likes').delete().eq('user_id',myProfile.id).eq('post_id',String(pid))}
  else{r=await supa.from('likes').insert([{user_id:myProfile.id,post_id:String(pid)}])}
  if(r&&r.error)throw r.error;
 }catch(err){
  console.error('like error:',err);
  /* revert */
  if(wasLiked){myLikes[pid]=true;likeCache[pid]=(likeCache[pid]||0)+1}
  else{delete myLikes[pid];likeCache[pid]=Math.max(0,(likeCache[pid]||0)-1)}
  el.classList.toggle('liked',!!myLikes[pid]);
  if(ic)ic.innerHTML=myLikes[pid]?heartI():heartOI();
  if(ce)ce.textContent=likeCache[pid]||'';
 }
}

async function delPost(pid){
 if(!confirm('この投稿を削除しますか？'))return;
 try{var r=await supa.from('posts').delete().eq('id',pid);if(r.error)throw r.error;var el=document.querySelector('[data-post-id="'+pid+'"]');if(el){el.style.transition='opacity .3s,transform .3s';el.style.opacity='0';el.style.transform='scale(.97)';setTimeout(function(){el.remove()},320)}}
 catch(err){alert('削除に失敗しました: '+(err.message||err))}
}

/* ── post HTML ── */
function postHTML(p){
 var pa=splitContent(p.content);
 var imgH=pa.img?'<div class="post-image"><img src="'+e(pa.img)+'" loading="lazy"></div>':'';
 var uid=p.author_handle?uidCache[p.author_handle]:'';
 var avSrc=uid?(supa.storage.from(BUCKET).getPublicUrl('profiles/'+uid+'/avatar').data.publicUrl+'?v='+Date.now()):'';
 var avH=avSrc?'<img src="'+e(avSrc)+'" loading="lazy" onerror="avErr(this)">':avI();
 var liked=p.id&&myLikes[p.id];var lc=p.id?(likeCache[p.id]||0):0;
 var rc=p.id?(rpCountCache[p.id]||0):0;
 var isOwn=myProfile&&p.author_handle===myProfile.user_handle;
 var likeH=p.id?('<button class="action-btn like-btn'+(liked?' liked':'')+'" onclick="togLike(\''+ea(p.id)+'\')"><span class="like-icon">'+(liked?heartI():heartOI())+'</span><span class="like-count">'+(lc||'')+'</span></button>'):'';
 var replyH=p.id?('<a class="action-btn reply-btn" href="/post/?id='+ea(p.id)+'">'+replyI()+'<span class="reply-count">'+(rc||'')+'</span></a>'):'';
 var repostH=p.id?('<button class="action-btn repost-btn" onclick="showRepostBox(\''+ea(p.id)+'\',\''+ea(p.author||'')+'\',\''+ea(p.author_handle||'')+'\',\''+ea(p.content||'')+'\')">'+repostI()+'</button>'):'';
 var delH=isOwn&&p.id?'<button class="action-btn delete-btn" onclick="delPost(\''+ea(p.id)+'\')">'+trashI()+'</button>':'';
 var qpa=p.repost_of?splitContent(p.repost_content||''):null;
 var quoteImgH=qpa&&qpa.img?'<div class="post-image" style="margin-top:6px"><img src="'+e(qpa.img)+'" loading="lazy"></div>':'';
 var quoteH=p.repost_of?('<div class="repost-quote"><div class="repost-quote-meta"><b>'+e(p.repost_author||'')+'</b> @'+e(p.repost_handle||'')+'</div><div class="repost-quote-body">'+autoLink(e(qpa?qpa.text||'':''))+'</div>'+quoteImgH+'</div>'):'';
 var bodyTxt=pa.text?('<div class="post-body">'+autoLink(e(pa.text))+'</div>'):'';
 var recoroLabel=p.repost_of?'<div class="recoro-label">'+repostI()+' リコロ</div>':'';
 return '<div class="post-item"'+(p.id?' data-post-id="'+e(p.id)+'"':'')+
  (p.repost_of?' style="border-left:3px solid #00ba7c"':'')+
  (p.id?' onclick="postItemClick(\''+ea(p.id)+'\',event)"':'')+'>'+
  recoroLabel+
  '<div class="post-row">'+
  '<a href="/user/?@'+e(p.author_handle||'')+'" class="post-avatar-sm">'+avH+'</a>'+
  '<div class="post-row-content">'+
  '<div class="post-meta">'+
  '<span class="post-name">'+e(p.author||'ななし')+'</span>'+
  '<span class="post-handle">@'+e(p.author_handle||'none')+'</span>'+
  '<span class="post-time" title="'+(p.created_at||'')+'">'+fmtD(p.created_at)+'</span>'+
  '</div>'+bodyTxt+quoteH+imgH+
  '<div class="post-actions">'+replyH+repostH+likeH+delH+'</div>'+
  '</div></div></div>';
}

/* ── load posts ── */
async function loadPosts(mode){
 if((isLoading||allLoaded)&&mode!=='initial')return;
 if(mode==='initial'){isLoading=false;allLoaded=false;oldest=null;likeCache={};myLikes={}}
 isLoading=true;
 var msg=document.getElementById('load-more-msg');if(msg)msg.style.display='block';
 var q=supa.from('posts').select('*').order('created_at',{ascending:false}).limit(PAGE).is('reply_to',null);
 if(oldest)q=q.lt('created_at',oldest);
 var r=await q;
 if(msg)msg.style.display='none';isLoading=false;
 if(!r.data||!r.data.length){allLoaded=true;return}
 var posts=r.data;oldest=posts[posts.length-1].created_at;
 await prefetchUids(posts);
 var ids=posts.map(function(p){return p.id}).filter(Boolean);
 await fetchLikes(ids);
 await fetchRpCounts(ids);
 var fd=document.getElementById('feed');
 posts.forEach(function(p){var d=document.createElement('div');d.innerHTML=postHTML(p);fd.appendChild(d.firstChild)});
 if(posts.length<PAGE)allLoaded=true;
}

/* ── scroll ── */
window.addEventListener('scroll',function(){if((window.scrollY+window.innerHeight)>=(document.documentElement.scrollHeight-400))loadPosts('more')});

/* ── new post ── */
async function doPost(){
 if(!myProfile)return;
 var ta=document.getElementById('post-text'),btn=document.getElementById('post-btn');
 var txt=(ta&&ta.value)||'';
 if([...txt].length>MAX_CHARS)return alert(MAX_CHARS+'文字以内で入力してください');
 if(!txt.trim()&&!selectedImg)return;
 if(btn)btn.disabled=true;
 try{
  var imgUrl='';
  if(selectedImg){var ts=Date.now(),rnd=Math.random().toString(36).slice(2,8);imgUrl=await uploadImg(selectedImg,'posts/'+myProfile.id+'/'+ts+'_'+rnd)}
  var content=txt.trim()+(imgUrl?'\n\n[img]'+imgUrl+'[/img]':'');
  var ins=await supa.from('posts').insert([{content:content,author:myProfile.display_name,author_handle:myProfile.user_handle}]).select();
  if(ins.error)throw ins.error;
  if(ta)ta.value='';clearImg();updateCC();
  if(ins.data&&ins.data[0]){var np=ins.data[0];likeCache[np.id]=0;prependPost(np)}
 }catch(err){alert('投稿に失敗しました: '+(err.message||err))}
 if(btn)btn.disabled=false;
}

function prependPost(p){
 var fd=document.getElementById('feed');if(!fd)return;
 var d=document.createElement('div');d.innerHTML=postHTML(p);var el=d.firstChild;
 fd.insertBefore(el,fd.firstChild);
 try{new Audio('oto.mp3').play().catch(function(){});}catch(ex){}
}

/* ── fetch reply counts ── */
async function fetchRpCounts(ids){
 if(!ids.length)return;
 try{
  var r=await supa.from('posts').select('root_id').in('root_id',ids.map(String));
  if(!r.data)return;
  r.data.forEach(function(row){if(row.root_id)rpCountCache[row.root_id]=(rpCountCache[row.root_id]||0)+1});
 }catch(ex){console.error('fetchRpCounts:',ex)}
}

/* ── repost modal ── */
function showRepostBox(pid,author,handle,content){
 if(!myProfile){alert('ログインしてください');return}
 var bd=document.createElement('div');bd.className='repost-modal-backdrop';bd.id='repost-bd';
 bd.onclick=function(ev){if(ev.target===bd)closeRepostBox()};
 var cparsed=splitContent(content);var cqImgH=cparsed.img?'<div class="post-image" style="margin-top:6px"><img src="'+e(cparsed.img)+'" loading="lazy"></div>':'';
 bd.innerHTML='<div class="repost-modal">'+
  '<h3>'+repostI()+' リコロ</h3>'+
  '<div class="repost-quote" style="margin-bottom:10px">'+
  '<div class="repost-quote-meta"><b>'+e(author)+'</b> @'+e(handle)+'</div>'+
  '<div class="repost-quote-body">'+autoLink(e(cparsed.text||''))+'</div>'+cqImgH+'</div>'+

  '<textarea id="repost-txt" placeholder="コメントを追加（省略可）" rows="2"></textarea>'+
  '<div class="repost-modal-actions">'+
  '<button class="btn-outline btn" onclick="closeRepostBox()">キャンセル</button>'+
  '<button class="btn" onclick="doRepost(\''+ea(pid)+'\',\''+ea(author)+'\',\''+ea(handle)+'\',\''+ea(content)+'\')" id="repost-submit-btn">リコロする</button>'+
  '</div></div>';
 document.body.appendChild(bd);
 var ta=document.getElementById('repost-txt');if(ta)ta.focus();
}
function closeRepostBox(){var b=document.getElementById('repost-bd');if(b)b.remove()}
async function doRepost(pid,author,handle,content){
 if(!myProfile)return;
 var ta=document.getElementById('repost-txt');
 var comment=(ta&&ta.value)||'';
 var sb=document.getElementById('repost-submit-btn');if(sb)sb.disabled=true;
 try{
  var ins=await supa.from('posts').insert([{
   content:comment.trim(),
   author:myProfile.display_name,
   author_handle:myProfile.user_handle,
   repost_of:String(pid),
   repost_author:author,
   repost_handle:handle,
   repost_content:content
  }]).select();
  if(ins.error)throw ins.error;
  closeRepostBox();
  if(ins.data&&ins.data[0]){likeCache[ins.data[0].id]=0;prependPost(ins.data[0])}
 }catch(err){alert('リコロに失敗しました: '+(err.message||err));if(sb)sb.disabled=false}
}

/* ── realtime ── */
function subscribeRT(){
 supa.channel('koro-posts').on('postgres_changes',{event:'INSERT',schema:'public',table:'posts'},async function(payload){
  var p=payload.new;if(!p||!p.id)return;
  if(p.reply_to&&!p.repost_of)return; // リプころはフィードに出さない
  if(myProfile&&p.author_handle===myProfile.user_handle)return;
  if(p.author_handle&&!uidCache[p.author_handle]){await prefetchUids([p])}
  likeCache[p.id]=0;rpCountCache[p.id]=0;prependPost(p);
 }).subscribe();
}

init();
</script>
